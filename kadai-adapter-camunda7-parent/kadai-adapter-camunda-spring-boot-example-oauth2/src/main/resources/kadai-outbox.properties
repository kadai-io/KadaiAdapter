kadai.adapter.outbox.schema=kadai_tables
kadai.adapter.outbox.max.number.of.events=57
kadai.adapter.outbox.initial.number.of.task.creation.retries=3
kadai.adapter.outbox.duration.between.task.creation.retries=PT1S
# Same H2 in-memory database as spring.datasource in application.properties.
# Spring Boot creates the datasource and runs schema.sql (outbox tables) on startup.
# OutboxDataSource connects to the same named H2 instance within the JVM.
kadai.adapter.outbox.datasource.driver=org.h2.Driver
kadai.adapter.outbox.datasource.url=jdbc:h2:mem:outbox;NON_KEYWORDS=KEY,VALUE;IGNORECASE=TRUE;LOCK_MODE=0;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
kadai.adapter.outbox.datasource.username=sa
kadai.adapter.outbox.datasource.password=sa


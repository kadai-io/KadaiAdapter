# Spring
server.port=8083
spring.main.allow-bean-definition-overriding=true
# Logging
logging.level.io.kadai=DEBUG
# Kernel
kadai-adapter.kernel.run-as-user=taskadmin
kadai-adapter.kernel.scheduler.start-kadai-tasks-interval=10000
kadai-adapter.kernel.scheduler.complete-referenced-tasks-interval=10000
kadai-adapter.kernel.scheduler.claim-referenced-tasks-interval=10000
kadai-adapter.kernel.scheduler.cancel-claim-referenced-tasks-interval=10000
kadai-adapter.kernel.scheduler.check-finished-referenced-tasks-interval=10000
kadai-adapter.kernel.kadai-connector.task-mapping.object-reference.company=DEFAULT_COMPANY
kadai-adapter.kernel.kadai-connector.task-mapping.object-reference.system=DEFAULT_SYSTEM
kadai-adapter.kernel.kadai-connector.task-mapping.object-reference.system-instance=DEFAULT_SYSTEM_INSTANCE
kadai-adapter.kernel.kadai-connector.task-mapping.object-reference.type=DEFAULT_TYPE
kadai-adapter.kernel.kadai-connector.task-mapping.object-reference.value=DEFAULT_VALUE
kadai.datasource.jdbcUrl=jdbc:h2:mem:kadai;NON_KEYWORDS=KEY,VALUE;IGNORECASE=TRUE;LOCK_MODE=0;DB_CLOSE_ON_EXIT=FALSE
kadai.datasource.driverClassName=org.h2.Driver
kadai.datasource.username=sa
kadai.datasource.password=sa
kadai.schemaName=KADAI
kadai-adapter.kernel.kadai-connector.batch-size=1
# Outbox H2 database shared between the embedded outbox REST service and the tests.
# Spring Boot auto-configures this datasource and runs schema.sql against it.
spring.datasource.url=jdbc:h2:mem:outbox;NON_KEYWORDS=KEY,VALUE;IGNORECASE=TRUE;LOCK_MODE=0;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa
# Jersey: mount the outbox JAX-RS application under /outbox-rest
spring.jersey.application-path=/outbox-rest
# Camunda 7 Plugin - the embedded outbox REST service runs on the same port
kadai-adapter.plugin.camunda7.systems[0].system-rest-url=http://localhost:${server.port}/engine-rest
kadai-adapter.plugin.camunda7.systems[0].system-task-event-url=http://localhost:${server.port}/outbox-rest
kadai-adapter.plugin.camunda7.client.username=demo
kadai-adapter.plugin.camunda7.client.password=demo
# --- OAuth2 authentication for the Outbox REST API ---
# The embedded authorization server (EmbeddedAuthorizationServerConfig) exposes /oauth2/token
# on the same port as this application - no external identity provider required.
kadai-adapter.plugin.camunda7.outbox.auth-type=OAUTH2
kadai-adapter.plugin.camunda7.outbox.oauth2.token-uri=http://localhost:${server.port}/oauth2/token
kadai-adapter.plugin.camunda7.outbox.oauth2.client-id=kadai-adapter
kadai-adapter.plugin.camunda7.outbox.oauth2.client-secret=super-secret
kadai-adapter.plugin.camunda7.outbox.oauth2.scopes=outbox:read outbox:write
kadai-adapter.plugin.camunda7.lock-duration=300
# Health
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

